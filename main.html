<h1>Login Form</h1>

<form id="loginForm">

  <label for="username">Username:</label>
  <input type="text" id="username"><br><br>

  <label for="password">Password:</label>

  <input type="checkbox" id="checkbox">
  <label for="checkbox">Remember me:</label><br><br>

</form>

<br>

  Login as existing user
</button>
